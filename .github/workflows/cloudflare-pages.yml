name: Cloudflare Pages

# Deploys the Vite build to Cloudflare Pages.
#   - push to main      → production deployment
#   - pull_request      → unique Preview URL (staging / review)
#
# Skips automatically until the two repo secrets exist, so CI never goes red
# before Cloudflare is connected:
#   CLOUDFLARE_API_TOKEN   (Pages:Edit token)
#   CLOUDFLARE_ACCOUNT_ID
# One-time: create the Pages project named `portfolio`
#   (dashboard, or `npx wrangler pages project create portfolio`).
# Alternatively use Cloudflare's native Git integration and delete this file.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    env:
      HAS_CF: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Skip notice
        if: env.HAS_CF != 'true'
        run: echo "::notice::Cloudflare secrets not set — skipping deploy. Add CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID to enable."

      - name: Setup Node
        if: env.HAS_CF == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & build
        if: env.HAS_CF == 'true'
        run: |
          npm install
          npm run build

      - name: Deploy to Cloudflare Pages
        if: env.HAS_CF == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist --project-name=portfolio --branch=${{ github.head_ref || github.ref_name }}
