name: Lint CSS & JS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create stylelint config
        run: |
          cat > .stylelintrc.json << 'EOF'
          {
            "extends": "stylelint-config-standard",
            "rules": {
              "no-descending-specificity": null,
              "selector-class-pattern": null,
              "custom-property-pattern": null,
              "alpha-value-notation": null,
              "color-function-notation": null,
              "declaration-block-no-redundant-longhand-properties": null,
              "function-no-unknown": [true, { "ignoreFunctions": ["color-mix", "env"] }],
              "media-feature-name-no-unknown": [true, { "ignoreMediaFeatureNames": ["prefers-reduced-motion"] }]
            }
          }
          EOF

      - name: Install & Run Stylelint
        run: |
          npm install stylelint stylelint-config-standard
          npx stylelint "style.css" --formatter compact

      - name: Syntax check JS (non-module)
        run: |
          node -c script.js
          node -c codeData.js

      - name: Syntax check JS (ES modules)
        run: |
          for f in modules/*.js; do
            node --input-type=module -e "$(cat "$f")" 2>/dev/null && echo "OK: $f" || echo "WARN: $f (import resolution expected in browser)"
          done
