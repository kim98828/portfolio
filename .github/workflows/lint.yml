name: Lint CSS & JS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install linters
        run: npm install -g stylelint stylelint-config-standard

      - name: Lint CSS
        run: |
          echo '{ "extends": "stylelint-config-standard", "rules": { "no-descending-specificity": null, "selector-class-pattern": null, "custom-property-pattern": null, "alpha-value-notation": null, "color-function-notation": null, "declaration-block-no-redundant-longhand-properties": null } }' > .stylelintrc.json
          npx stylelint "style.css" --formatter compact || true

      - name: Syntax check JS
        run: |
          node -c script.js
          node -c codeData.js
          # ES modules require --input-type flag
          for f in modules/*.js; do
            node --input-type=module --check < "$f" 2>/dev/null || node -c "$f" 2>/dev/null || echo "Note: $f uses ES modules (browser-native)"
          done
